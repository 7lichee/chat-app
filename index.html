<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>水仙</title>

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* ❗防止页面滚动抖动 */
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f7f6f3;
    }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ===== 聊天区域 ===== */
    #chat {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 20px 14px;
      box-sizing: border-box;
      padding-bottom: 140px; /* 给输入框留空间 */
    }

    .msg {
      display: block;
      width: fit-content;
      padding: 12px 16px;
      margin: 10px 0;
      border-radius: 16px;
      max-width: 78%;
      line-height: 1.6;
      word-break: break-word;
      font-size: 15px;
    }

    .me1 { background: #e6efe9; margin-left: auto; }
    .me2 { background: #fff; margin-right: auto; border: 1px solid #ececec; }

    /* ===== 输入栏（核心优化） ===== */
    #inputArea {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;

      display: flex;
      align-items: flex-end;
      gap: 8px;

      padding: 10px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));

      background: rgba(247,246,243,0.92);
      backdrop-filter: blur(12px);

      transform: translateY(0);
      transition: transform 0.2s ease;
    }

    textarea {
      flex: 1;
      font-size: 16px;
      line-height: 20px;
      padding: 8px 14px;

      min-height: 36px;
      max-height: 120px;

      border-radius: 20px;
      border: none;
      outline: none;

      resize: none;
      overflow-y: auto;
    }

    .icon-btn {
      border: none;
      background: transparent;
      font-size: 20px;
      padding: 6px;
    }

    .send-btn {
      background: #dfeee7;
      color: #4f7f6f;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .date-wrapper {
      text-align: center;
    }

    .date-badge {
      display: inline-block;
      background: #e5e5e5;
      color: #666;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 12px;
      margin: 20px auto 10px;
    }
  </style>
</head>

<body>

<div id="app">
  <div id="chat"></div>

  <div id="inputArea">
    <button onclick="switchRole()" class="icon-btn" id="roleBtn"
      onmousedown="event.preventDefault()">🍋‍🟩</button>

    <textarea id="text" placeholder="写下一点此刻的想法..."></textarea>

    <button class="send-btn"
      onmousedown="event.preventDefault()"
      onclick="send()">↑</button>

    <button onclick="exportTxt()" class="icon-btn">☁️</button>
  </div>
</div>

<script>
let role = "A";
let messages = JSON.parse(localStorage.getItem("chat") || "[]");

const textarea = document.getElementById("text");
const chat = document.getElementById("chat");
const inputArea = document.getElementById("inputArea");

/* ===== iOS 键盘适配核心 ===== */
let keyboardHeight = 0;

if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", () => {
    const vh = window.innerHeight - window.visualViewport.height;

    keyboardHeight = vh > 100 ? vh : 0;

    inputArea.style.transform = `translateY(-${keyboardHeight}px)`;
    scrollToBottom();
  });
}

/* 防止滚动抖动 */
document.body.addEventListener('touchmove', e => {
  if (e.target.closest('#chat')) return;
  e.preventDefault();
}, { passive: false });

/* 自动高度 */
textarea.addEventListener("input", () => {
  textarea.style.height = "36px";
  textarea.style.height = textarea.scrollHeight + "px";
});

/* ===== 渲染 ===== */
function formatDate(d) {
  const t = new Date(d);
  return `${t.getFullYear()}.${String(t.getMonth()+1).padStart(2,'0')}.${String(t.getDate()).padStart(2,'0')}`;
}

function render() {
  chat.innerHTML = "";

  let lastDate = "";

  messages.forEach((m, index) => {
    const d = formatDate(m.time);

    if (d !== lastDate) {
      const wrap = document.createElement("div");
      wrap.className = "date-wrapper";
      wrap.innerHTML = `<div class="date-badge">${d}</div>`;
      chat.appendChild(wrap);
      lastDate = d;
    }

    const div = document.createElement("div");
    div.className = "msg " + (m.role === "A" ? "me1" : "me2");
    div.innerText = m.text;

    let timer;

    div.addEventListener("touchstart", () => {
      timer = setTimeout(() => {
        if (confirm("删除这条消息？")) {
          messages.splice(index, 1);
          localStorage.setItem("chat", JSON.stringify(messages));
          render();
        }
      }, 500);
    });

    div.addEventListener("touchend", () => clearTimeout(timer));
    div.addEventListener("touchmove", () => clearTimeout(timer));

    chat.appendChild(div);
  });

  scrollToBottom();
}

/* ===== 平滑滚动（防跳） ===== */
function scrollToBottom() {
  requestAnimationFrame(() => {
    chat.scrollTop = chat.scrollHeight;
  });
}

/* ===== 发送 ===== */
function send() {
  if (!textarea.value.trim()) return;

  messages.push({
    role,
    text: textarea.value,
    time: new Date().toISOString()
  });

  localStorage.setItem("chat", JSON.stringify(messages));

  textarea.value = "";
  textarea.style.height = "36px";

  render();

  // ⭐ 保持键盘
  setTimeout(() => textarea.focus(), 0);
}

/* ===== 切换角色 ===== */
function switchRole() {
  role = role === "A" ? "B" : "A";
  document.getElementById("roleBtn").innerText = role === "A" ? "🍋‍🟩" : "🤍";
}

/* ===== 导出 ===== */
function exportTxt() {
  let start = prompt("开始日期 (2026-05-01)");
  let end = prompt("结束日期 (2026-05-04)");
  if (!start || !end) return;

  const s = new Date(start);
  const e = new Date(end);
  e.setHours(23,59,59,999);

  const filtered = messages.filter(m => {
    const t = new Date(m.time);
    return t >= s && t <= e;
  });

  let text = "";
  let last = "";

  filtered.forEach(m => {
    const d = formatDate(m.time);
    if (d !== last) {
      text += `\n${d}\n`;
      last = d;
    }
    text += `${m.role}: ${m.text}\n`;
  });

  const blob = new Blob([text], { type: "text/plain" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = `${start}-${end}.txt`;
  a.click();
}

render();
</script>

</body>
</html>
