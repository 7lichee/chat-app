<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>自我对话</title>

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

  <!-- iPhone 图标 -->
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">

  <!-- App 模式 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="自我对话">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f7f6f3;
      color: #2c2c2c;
    }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 14px;
      padding-bottom: 120px;
      box-sizing: border-box;
    }

    .msg {
      display: block;
      width: fit-content;
      padding: 12px 16px;
      margin: 10px 0;
      border-radius: 16px;
      max-width: 78%;
      line-height: 1.6;
      word-break: break-word;
      font-size: 15px;
    }

    .me1 {
      background: #e6efe9;
      margin-left: auto;
    }

    .me2 {
      background: #ffffff;
      margin-right: auto;
      border: 1px solid #ececec;
    }

    .date-badge {
      display: inline-block;
      background: #e5e5e5;
      color: #666;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 12px;
      margin: 20px auto 10px;
      text-align: center;
    }

    .date-wrapper {
      text-align: center;
    }

    #inputArea {
      position: sticky;
      bottom: 0;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      background: rgba(247,246,243,0.9);
      backdrop-filter: blur(12px);
    }

    textarea {
      flex: 1;
      font-size: 16px;
      line-height: 20px;
      padding: 8px 14px;
      height: 36px;
      border-radius: 20px;
      border: none;
      background: #ffffff;
      outline: none;
      resize: none;
      max-height: 120px;
      overflow-y: auto;
      box-sizing: border-box;
    }

    .icon-btn {
      border: none;
      background: transparent;
      font-size: 20px;
      padding: 6px;
    }

    .send-btn {
      background: #dfeee7;
      color: #4f7f6f;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
  </style>
</head>

<body>

<div id="app">
  <div id="chat"></div>

  <div id="inputArea">
    <button onclick="switchRole()" id="roleBtn" class="icon-btn">🍋‍🟩</button>

    <textarea id="text" rows="1" placeholder="写下一点此刻的想法..."></textarea>

    <button onclick="send()" class="send-btn">↑</button>

    <button onclick="exportTxt()" class="icon-btn">☁️</button>
  </div>
</div>

<script>
let role = "A";
let messages = JSON.parse(localStorage.getItem("chat") || "[]");

/* 修复旧数据 */
messages = messages.map(m => {
  if (!m.time) m.time = new Date().toISOString();
  return m;
});

const textarea = document.getElementById("text");

/* 自动高度 */
textarea.addEventListener("input", () => {
  textarea.style.height = "36px";
  textarea.style.height = textarea.scrollHeight + "px";
});

/* 日期格式 */
function formatDate(dateStr) {
  const d = new Date(dateStr);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

function render() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  let lastDate = "";

  messages.forEach((m, index) => {
    const currentDate = formatDate(m.time);

    if (currentDate !== lastDate) {
      const wrapper = document.createElement("div");
      wrapper.className = "date-wrapper";

      const badge = document.createElement("div");
      badge.className = "date-badge";
      badge.innerText = currentDate;

      wrapper.appendChild(badge);
      chat.appendChild(wrapper);

      lastDate = currentDate;
    }

    const div = document.createElement("div");
    div.className = "msg " + (m.role === "A" ? "me1" : "me2");
    div.innerText = m.text;

    /* ✅ 长按删除 */
    let pressTimer;

    div.addEventListener("touchstart", () => {
      pressTimer = setTimeout(() => {
        if (confirm("删除这条消息？")) {
          messages.splice(index, 1);
          localStorage.setItem("chat", JSON.stringify(messages));
          render();
        }
      }, 500);
    });

    div.addEventListener("touchend", () => {
      clearTimeout(pressTimer);
    });

    div.addEventListener("touchmove", () => {
      clearTimeout(pressTimer);
    });

    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

function send() {
  const input = textarea;
  if (!input.value.trim()) return;

  messages.push({
    role,
    text: input.value,
    time: new Date().toISOString()
  });

  localStorage.setItem("chat", JSON.stringify(messages));

  input.value = "";
  input.style.height = "36px";
  render();
}

function switchRole() {
  role = role === "A" ? "B" : "A";
  document.getElementById("roleBtn").innerText =
    role === "A" ? "🍋‍🟩" : "🤍";
}

function exportTxt() {
  let start = prompt("开始日期 (2026-05-01)");
  let end = prompt("结束日期 (2026-05-04)");
  if (!start || !end) return;

  const startDate = new Date(start);
  const endDate = new Date(end);
  endDate.setHours(23,59,59,999);

  const filtered = messages.filter(m => {
    const t = new Date(m.time);
    return t >= startDate && t <= endDate;
  });

  let text = "";
  let lastDate = "";

  filtered.forEach(m => {
    const d = formatDate(m.time);

    if (d !== lastDate) {
      text += `\n${d}\n`;
      lastDate = d;
    }

    text += `${m.role}: ${m.text}\n`;
  });

  const blob = new Blob([text], { type: "text/plain" });
  const url = URL.createObjectURL(blob);

  const fileName = `${start.replace(/-/g,'.')}-${end.replace(/-/g,'.')}.txt`;

  const a = document.createElement("a");
  a.href = url;
  a.download = fileName;
  a.click();
}

render();
</script>

</body>
</html>
