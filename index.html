<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>自我对话</title>

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f7f6f3;
      color: #2c2c2c;
    }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 14px;
      padding-bottom: 120px;
      box-sizing: border-box;
    }

    .msg {
      display: block;
      width: fit-content;
      padding: 12px 16px;
      margin: 10px 0;
      border-radius: 16px;
      max-width: 78%;
      line-height: 1.6;
      word-break: break-word;
      font-size: 15px;
    }

    .me1 {
      background: #e6efe9;
      margin-left: auto;
    }

    .me2 {
      background: #ffffff;
      margin-right: auto;
      border: 1px solid #ececec;
    }

    #inputArea {
      position: sticky;
      bottom: 0;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      background: rgba(247,246,243,0.9);
      backdrop-filter: blur(12px);
    }

    textarea {
      flex: 1;
      padding: 12px 14px;
      border-radius: 20px;
      border: none;
      background: #ffffff;
      font-size: 16px;
      outline: none;
      resize: none;
      line-height: 1.5;

      height: 44px;          /* ✅ 初始一行高度 */
      max-height: 120px;
      overflow-y: auto;
    }

    .icon-btn {
      border: none;
      background: transparent;
      font-size: 20px;
      padding: 6px;
    }

    .send-btn {
      background: #dfeee7;
      color: #4f7f6f;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
  </style>
</head>

<body>

<div id="app">
  <div id="chat"></div>

  <div id="inputArea">
    <button onclick="switchRole()" id="roleBtn" class="icon-btn">🍋‍🟩</button>

    <textarea id="text" placeholder="写下一点此刻的想法..."></textarea>

    <button onclick="send()" class="send-btn">↑</button>

    <button onclick="exportTxt()" class="icon-btn">☁️</button>
  </div>
</div>

<script>
let role = "A";
let messages = JSON.parse(localStorage.getItem("chat") || "[]");

const textarea = document.getElementById("text");

/* ✅ 自动高度（保持一行起步） */
textarea.addEventListener("input", () => {
  textarea.style.height = "44px";
  textarea.style.height = textarea.scrollHeight + "px";
});

function render() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  messages.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + (m.role === "A" ? "me1" : "me2");
    div.innerText = m.text;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

function send() {
  const input = textarea;
  if (!input.value.trim()) return;

  messages.push({ role, text: input.value });
  localStorage.setItem("chat", JSON.stringify(messages));

  input.value = "";
  input.style.height = "44px"; // ✅ 发送后恢复一行高度
  render();
}

function switchRole() {
  role = role === "A" ? "B" : "A";
  document.getElementById("roleBtn").innerText =
    role === "A" ? "🍋‍🟩" : "🤍";
}

function exportTxt() {
  const text = messages.map(m => `${m.role}: ${m.text}`).join("\n");
  const blob = new Blob([text], { type: "text/plain" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "chat.txt";
  a.click();
}

render();
</script>

</body>
</html>
