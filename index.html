<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>自我对话</title>

  <!-- 手机适配 -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f2f7;
    }

    /* 聊天区域 */
    #chat {
      height: calc(100vh - 70px);
      overflow-y: auto;
      padding: 10px;
      box-sizing: border-box;
    }

    /* 聊天气泡 */
    .msg {
      padding: 10px 14px;
      margin: 6px 0;
      border-radius: 18px;
      max-width: 75%;
      line-height: 1.4;
      word-break: break-word;
    }

    /* 两个角色 */
    .me1 {
      background: #007aff;
      color: white;
      margin-left: auto;
    }

    .me2 {
      background: #e5e5ea;
      color: black;
      margin-right: auto;
    }

    /* 底部输入区 */
    #inputArea {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 8px;
      padding-bottom: calc(8px + env(safe-area-inset-bottom));
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      box-sizing: border-box;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #f1f1f1;
      font-size: 16px;
    }

    button {
      margin-left: 6px;
      border: none;
      border-radius: 12px;
      padding: 8px 10px;
      background: #007aff;
      color: white;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
  <button onclick="switchRole()" id="roleBtn">A</button>
  <input id="text" placeholder="输入内容..." />
  <button onclick="send()">发送</button>
  <button onclick="exportTxt()">导出</button>
</div>

<script>
let role = "A";
let messages = JSON.parse(localStorage.getItem("chat") || "[]");

function render() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  messages.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + (m.role === "A" ? "me1" : "me2");
    div.innerText = m.text;
    chat.appendChild(div);
  });

  // 自动滚动到底部
  chat.scrollTop = chat.scrollHeight;
}

function send() {
  const input = document.getElementById("text");
  if (!input.value.trim()) return;

  messages.push({ role, text: input.value });
  localStorage.setItem("chat", JSON.stringify(messages));

  input.value = "";
  render();
}

function switchRole() {
  role = role === "A" ? "B" : "A";
  document.getElementById("roleBtn").innerText = role;
}

function exportTxt() {
  const text = messages.map(m => `${m.role}: ${m.text}`).join("\n");
  const blob = new Blob([text], { type: "text/plain" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "chat.txt";
  a.click();
}

render();
</script>

</body>
</html>
