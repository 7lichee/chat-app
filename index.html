<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>自我对话</title>

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f7f6f3;
      color: #2c2c2c;
    }

    /* 聊天区域 */
    #chat {
      height: calc(100vh - 80px);
      overflow-y: auto;
      padding: 20px 14px;
      box-sizing: border-box;
    }

    /* 气泡基础 */
    .msg {
      padding: 12px 16px;
      margin: 10px 0;
      border-radius: 16px;
      max-width: 78%;
      line-height: 1.6;
      word-break: break-word;
      font-size: 15px;
    }

    /* A（偏理性） */
    .me1 {
      background: #e8ede7;
      margin-left: auto;
    }

    /* B（偏情绪） */
    .me2 {
      background: #ffffff;
      margin-right: auto;
      border: 1px solid #ececec;
    }

    /* 底部输入区 */
    #inputArea {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      background: rgba(247,246,243,0.9);
      backdrop-filter: blur(12px);
      box-sizing: border-box;
    }

    input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 20px;
      border: none;
      background: #ffffff;
      font-size: 15px;
      outline: none;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 8px 12px;
      background: #dcdcdc;
      color: #333;
      font-size: 14px;
    }

    /* 当前角色按钮强调 */
    #roleBtn {
      background: #cfd8cc;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
  <button onclick="switchRole()" id="roleBtn">理性</button>
  <input id="text" placeholder="写下一点此刻的想法..." />
  <button onclick="send()">发送</button>
  <button onclick="exportTxt()">导出</button>
</div>

<script>
let role = "A";
let messages = JSON.parse(localStorage.getItem("chat") || "[]");

function render() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  messages.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + (m.role === "A" ? "me1" : "me2");
    div.innerText = m.text;
    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
}

function send() {
  const input = document.getElementById("text");
  if (!input.value.trim()) return;

  messages.push({ role, text: input.value });
  localStorage.setItem("chat", JSON.stringify(messages));

  input.value = "";
  render();
}

function switchRole() {
  role = role === "A" ? "B" : "A";
  document.getElementById("roleBtn").innerText =
    role === "A" ? "理性" : "感受";
}

function exportTxt() {
  const text = messages.map(m => `${m.role}: ${m.text}`).join("\n");
  const blob = new Blob([text], { type: "text/plain" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "chat.txt";
  a.click();
}

render();
</script>

</body>
</html>
